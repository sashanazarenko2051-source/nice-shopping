async function restore() {
  var btn = document.getElementById('btn');
  var pass = document.getElementById('pass').value.trim();
  var status = document.getElementById('status');
  if (!pass) { alert('Введіть пароль'); return; }
  btn.disabled = true;
  btn.textContent = 'Входимо...';
  status.style.display = 'block';
  status.className = '';
  status.textContent = '⏳ Входимо в адмінку...';

  try {
    var r1 = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pass})
    });
    var d1 = await r1.json();
    if (!d1.token) throw new Error('Невірний пароль');

    status.textContent = '⏳ Зберігаємо ' + PRODUCTS.length + ' товарів...';
    var r2 = await fetch('/api/products', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + d1.token},
      body: JSON.stringify(PRODUCTS)
    });
    var d2 = await r2.json();

    status.className = 'ok';
    status.textContent = '✅ Відновлено ' + d2.count + ' товарів!\n\nТепер зайдіть в адмінку та для кожного товару:\n1. Натисніть ✏️ Змінити\n2. Вкажіть правильну ціну\n3. Додайте фото\n\nПісля цього видаліть цю сторінку (restore.html) з сайту.';
    btn.textContent = '✅ Готово!';
  } catch(e) {
    status.className = 'err';
    status.textContent = '❌ Помилка: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Спробувати ще раз';
  }
}
